<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯前端文本书签导航工具</title>
    <!-- Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- SheetJS CDN -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }


        /* 工具栏样式 */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-success {
            background-color: #2ecc71;
            color: white;
        }

        .btn-success:hover {
            background-color: #27ae60;
        }

        .btn-warning {
            background-color: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background-color: #d68910;
        }

        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }

        /* 搜索栏 */
        .search-bar {
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .search-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }


        /* 分类筛选栏 */
        .category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .category-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: #f8f9fa;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .category-btn:hover {
            background: #e9ecef;
        }

        .category-btn.active {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }

        /* 书签列表 */
        .bookmarks-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* 分页控件 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .page-info {
            font-size: 15px;
            color: #555;
            font-weight: 500;
        }

        .bookmark-item {
            background: white;
            border-radius: 8px;
            padding: 18px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            border-left: 4px solid #3498db;
        }

        .bookmark-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .bookmark-tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
            color: white;
            margin-bottom: 8px;
        }

        .bookmark-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            display: inline-block;
        }

        .bookmark-title a {
            color: #2c3e50;
            text-decoration: underline;
            text-decoration-color: #3498db;
            text-underline-offset: 3px;
            transition: color 0.2s;
        }

        .bookmark-title a:hover {
            color: #3498db;
        }

        .bookmark-note {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 8px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .bookmark-note i {
            color: #f39c12;
        }

        .bookmark-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #95a5a6;
            transition: color 0.2s;
            padding: 4px;
        }

        .action-btn:hover {
            color: #3498db;
        }

        .action-btn.delete:hover {
            color: #e74c3c;
        }

        /* 图片预览浮层 */
        .image-preview {
            position: absolute;
            z-index: 100;
            background: white;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 5px;
            display: none;
            max-width: 200px;
            max-height: 200px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 100%;
            display: block;
            border-radius: 4px;
        }

        .image-preview .image-loading,
        .image-preview .image-error {
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
            font-size: 14px;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: modalFadeIn 0.3s;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #95a5a6;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .modal-close:hover {
            background-color: #f8f9fa;
            color: #e74c3c;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #2c3e50;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            background-color: white;
            cursor: pointer;
        }

        .form-select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .form-hint {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 4px;
        }

        /* 管理弹窗列表 */
        .manage-list {
            list-style: none;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .manage-item:last-child {
            border-bottom: none;
        }

        .manage-item-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .color-preview {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #95a5a6;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            color: #bdc3c7;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .bookmarks-container {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .btn {
                justify-content: center;
            }
        }

        /* 提示框 */
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* 标签颜色亮度检测辅助类 */
        .text-light {
            color: white;
        }

        .text-dark {
            color: #333;
        }
    </style>
</head>
<body>
    <h1>📚 纯前端文本书签导航工具</h1>

    <!-- 提示消息 -->
    <div id="alert" class="alert"></div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <button id="addBookmarkBtn" class="btn btn-primary">
            <i class="fas fa-plus"></i> 添加书签
        </button>
        <button id="importExcelBtn" class="btn btn-success">
            <i class="fas fa-file-import"></i> 导入 Excel
        </button>
        <button id="exportExcelBtn" class="btn btn-success">
            <i class="fas fa-file-export"></i> 导出 Excel
        </button>
        <button id="manageTagsBtn" class="btn btn-warning">
            <i class="fas fa-tags"></i> 管理标签
        </button>
        <button id="manageCategoriesBtn" class="btn btn-warning">
            <i class="fas fa-folder"></i> 管理分类
        </button>
    </div>

    <!-- 搜索栏 -->
    <div class="search-bar">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="搜索书签标题、备注或链接...">
            <button id="searchBtn" class="btn btn-primary">
                <i class="fas fa-search"></i> 搜索
            </button>
            <button id="clearSearchBtn" class="btn btn-secondary">
                <i class="fas fa-times"></i> 清除
            </button>
        </div>
    </div>

    <!-- 分类筛选栏 -->
    <div class="category-filter" id="categoryFilter">
        <!-- 动态生成分类按钮 -->
    </div>

    <!-- 书签列表 -->
    <div class="bookmarks-container" id="bookmarksContainer">
        <!-- 动态生成书签项 -->
        <div class="empty-state" id="emptyState">
            <i class="fas fa-bookmark"></i>
            <h3>暂无书签</h3>
            <p>点击上方"添加书签"按钮开始添加您的第一个书签</p>
        </div>
    </div>

    <!-- 分页控件 -->
    <div class="pagination" id="pagination">
        <button id="prevPageBtn" class="btn btn-secondary" disabled>
            <i class="fas fa-chevron-left"></i> 上一页
        </button>
        <div class="page-info" id="pageInfo">第 1 页 / 共 1 页</div>
        <button id="nextPageBtn" class="btn btn-secondary" disabled>
            下一页 <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <!-- 图片预览浮层 -->
    <div id="imagePreview" class="image-preview"></div>

    <!-- 书签表单模态框 -->
    <div id="bookmarkModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="bookmarkModalTitle">添加书签</h2>
                <button class="modal-close" id="closeBookmarkModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="bookmarkForm">
                    <div class="form-group">
                        <label class="form-label" for="title">标题 <span style="color: #e74c3c;">*</span></label>
                        <input type="text" id="title" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="url">链接 <span style="color: #e74c3c;">*</span></label>
                        <input type="url" id="url" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="imageUrl">图片 URL</label>
                        <input type="url" id="imageUrl" class="form-control">
                        <div class="form-hint">鼠标悬停在书签标题上时将预览此图片</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="note">备注</label>
                        <textarea id="note" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="category">分类</label>
                        <select id="category" class="form-select">
                            <!-- 动态生成分类选项 -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="tag">标签</label>
                        <select id="tag" class="form-select">
                            <option value="">无标签</option>
                            <!-- 动态生成标签选项 -->
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelBookmarkBtn">取消</button>
                <button type="button" class="btn btn-primary" id="saveBookmarkBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 分类管理模态框 -->
    <div id="categoryModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">管理分类</h2>
                <button class="modal-close" id="closeCategoryModal">&times;</button>
            </div>
            <div class="modal-body">
                <ul class="manage-list" id="categoryList">
                    <!-- 动态生成分类列表 -->
                </ul>
                <div class="form-group">
                    <label class="form-label" for="newCategoryName">添加新分类</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="newCategoryName" class="form-control" placeholder="输入分类名称">
                        <button type="button" class="btn btn-primary" id="addCategoryBtn">添加</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="closeCategoryModalBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 标签管理模态框 -->
    <div id="tagModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">管理标签</h2>
                <button class="modal-close" id="closeTagModal">&times;</button>
            </div>
            <div class="modal-body">
                <ul class="manage-list" id="tagList">
                    <!-- 动态生成标签列表 -->
                </ul>
                <div class="form-group">
                    <label class="form-label">添加新标签</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="newTagName" class="form-control" placeholder="标签名称" style="flex: 1;">
                        <input type="color" id="newTagColor" value="#3498db" style="width: 50px; height: 40px;">
                        <button type="button" class="btn btn-primary" id="addTagBtn">添加</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="closeTagModalBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 文件输入（用于导入Excel，隐藏） -->
    <input type="file" id="excelFileInput" accept=".xlsx,.xls" style="display: none;">

    <script>
        // ==============================
        // 数据模型和 localStorage 管理
        // ==============================

        // 默认初始数据
        const DEFAULT_CATEGORIES = ['常用', '编程', '设计'];
        const DEFAULT_TAGS = [
            { name: '爆', color: '#ff4444' },
            { name: '荐', color: '#4caf50' },
            { name: '新', color: '#2196f3' }
        ];
        const DEFAULT_BOOKMARKS = [
            {
                id: generateId(),
                title: 'GitHub',
                url: 'https://github.com',
                imageUrl: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png',
                note: '全球最大的代码托管平台',
                category: '编程',
                tag: '荐'
            },
            {
                id: generateId(),
                title: 'MDN Web Docs',
                url: 'https://developer.mozilla.org',
                imageUrl: 'https://developer.mozilla.org/static/img/opengraph-logo.72382e605ce3.png',
                note: 'Web 技术文档',
                category: '编程',
                tag: '新'
            },
            {
                id: generateId(),
                title: 'Google',
                url: 'https://google.com',
                imageUrl: '',
                note: '搜索工具',
                category: '常用',
                tag: ''
            }
        ];

        // 生成唯一ID
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        // localStorage 键名
        const STORAGE_KEYS = {
            BOOKMARKS: 'bookmark_navigator_bookmarks',
            CATEGORIES: 'bookmark_navigator_categories',
            TAGS: 'bookmark_navigator_tags'
        };

        // 数据管理对象
        const DataManager = {
            // 初始化数据（首次加载时调用）
            init() {
                if (!this.getBookmarks() || this.getBookmarks().length === 0) {
                    this.saveBookmarks(DEFAULT_BOOKMARKS);
                }
                if (!this.getCategories() || this.getCategories().length === 0) {
                    this.saveCategories(DEFAULT_CATEGORIES);
                }
                if (!this.getTags() || this.getTags().length === 0) {
                    this.saveTags(DEFAULT_TAGS);
                }
                this.renderAll();
            },

            // 书签相关方法
            getBookmarks() {
                const data = localStorage.getItem(STORAGE_KEYS.BOOKMARKS);
                return data ? JSON.parse(data) : [];
            },

            saveBookmarks(bookmarks) {
                localStorage.setItem(STORAGE_KEYS.BOOKMARKS, JSON.stringify(bookmarks));
            },

            addBookmark(bookmark) {
                const bookmarks = this.getBookmarks();
                bookmarks.push(bookmark);
                this.saveBookmarks(bookmarks);
                return bookmark;
            },

            updateBookmark(id, updatedData) {
                const bookmarks = this.getBookmarks();
                const index = bookmarks.findIndex(b => b.id === id);
                if (index !== -1) {
                    bookmarks[index] = { ...bookmarks[index], ...updatedData };
                    this.saveBookmarks(bookmarks);
                    return true;
                }
                return false;
            },

            deleteBookmark(id) {
                const bookmarks = this.getBookmarks();
                const filtered = bookmarks.filter(b => b.id !== id);
                if (filtered.length !== bookmarks.length) {
                    this.saveBookmarks(filtered);
                    return true;
                }
                return false;
            },

            // 分类相关方法
            getCategories() {
                const data = localStorage.getItem(STORAGE_KEYS.CATEGORIES);
                return data ? JSON.parse(data) : [];
            },

            saveCategories(categories) {
                // 确保"常用"始终存在且在前
                if (!categories.includes('常用')) {
                    categories.unshift('常用');
                }
                localStorage.setItem(STORAGE_KEYS.CATEGORIES, JSON.stringify(categories));
            },

            addCategory(category) {
                if (!category.trim()) return false;
                const categories = this.getCategories();
                if (!categories.includes(category)) {
                    categories.push(category);
                    this.saveCategories(categories);
                    return true;
                }
                return false;
            },

            deleteCategory(category) {
                if (category === '常用') {
                    this.showAlert('不能删除默认分类"常用"', 'error');
                    return false;
                }

                const bookmarks = this.getBookmarks();
                const usingBookmarks = bookmarks.filter(b => b.category === category);

                if (usingBookmarks.length > 0) {
                    this.showAlert(`分类"${category}"下有${usingBookmarks.length}个书签，请先修改这些书签的分类后再删除`, 'error');
                    return false;
                }

                const categories = this.getCategories();
                const filtered = categories.filter(c => c !== category);
                if (filtered.length !== categories.length) {
                    this.saveCategories(filtered);
                    return true;
                }
                return false;
            },

            // 标签相关方法
            getTags() {
                const data = localStorage.getItem(STORAGE_KEYS.TAGS);
                return data ? JSON.parse(data) : [];
            },

            saveTags(tags) {
                localStorage.setItem(STORAGE_KEYS.TAGS, JSON.stringify(tags));
            },

            addTag(tag) {
                if (!tag.name || !tag.color) return false;
                const tags = this.getTags();
                // 检查是否已存在同名标签
                if (tags.some(t => t.name === tag.name)) {
                    this.showAlert(`标签"${tag.name}"已存在`, 'error');
                    return false;
                }
                tags.push(tag);
                this.saveTags(tags);
                return true;
            },

            updateTag(oldName, updatedTag) {
                const tags = this.getTags();
                const index = tags.findIndex(t => t.name === oldName);
                if (index !== -1) {
                    // 如果修改了名称，检查是否与其他标签冲突
                    if (oldName !== updatedTag.name && tags.some(t => t.name === updatedTag.name)) {
                        this.showAlert(`标签"${updatedTag.name}"已存在`, 'error');
                        return false;
                    }
                    tags[index] = updatedTag;
                    this.saveTags(tags);

                    // 更新使用该标签的书签
                    const bookmarks = this.getBookmarks();
                    const updatedBookmarks = bookmarks.map(b => {
                        if (b.tag === oldName) {
                            return { ...b, tag: updatedTag.name };
                        }
                        return b;
                    });
                    this.saveBookmarks(updatedBookmarks);

                    return true;
                }
                return false;
            },

            deleteTag(tagName) {
                const tags = this.getTags();
                const tag = tags.find(t => t.name === tagName);
                if (!tag) return false;

                const bookmarks = this.getBookmarks();
                const usingBookmarks = bookmarks.filter(b => b.tag === tagName);

                if (usingBookmarks.length > 0) {
                    this.showAlert(`标签"${tagName}"下有${usingBookmarks.length}个书签，请先移除这些书签的标签后再删除`, 'error');
                    return false;
                }

                const filtered = tags.filter(t => t.name !== tagName);
                if (filtered.length !== tags.length) {
                    this.saveTags(filtered);
                    return true;
                }
                return false;
            },

            // 根据标签名称获取标签颜色
            getTagColor(tagName) {
                const tags = this.getTags();
                const tag = tags.find(t => t.name === tagName);
                return tag ? tag.color : '#cccccc';
            },

            // 判断颜色是深色还是浅色，用于决定文字颜色
            isDarkColor(hexColor) {
                // 转换 hex 为 rgb
                const r = parseInt(hexColor.substr(1, 2), 16);
                const g = parseInt(hexColor.substr(3, 2), 16);
                const b = parseInt(hexColor.substr(5, 2), 16);
                // 计算亮度
                const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                return brightness < 128; // 小于128为深色
            },

            // 渲染所有内容
            renderAll() {
                // 重置到第一页
                currentPage = 1;
                this.renderCategories();
                this.renderBookmarks();
                this.renderCategoryOptions();
                this.renderTagOptions();
            },

            // 显示提示消息
            showAlert(message, type = 'success') {
                const alertEl = document.getElementById('alert');
                alertEl.textContent = message;
                alertEl.className = `alert alert-${type}`;
                alertEl.style.display = 'block';

                setTimeout(() => {
                    alertEl.style.display = 'none';
                }, 3000);
            },

            // 渲染分类筛选栏
            renderCategories() {
                const container = document.getElementById('categoryFilter');
                const categories = this.getCategories();

                let html = `<button class="category-btn ${currentCategory === '全部' ? 'active' : ''}" data-category="全部">全部</button>`;

                categories.forEach(category => {
                    html += `<button class="category-btn ${currentCategory === category ? 'active' : ''}" data-category="${category}">${category}</button>`;
                });

                container.innerHTML = html;

                // 为分类按钮添加事件监听器
                container.querySelectorAll('.category-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        currentCategory = btn.dataset.category;
                        currentPage = 1; // 切换分类时回到第一页
                        this.renderCategories();
                        this.renderBookmarks();
                    });
                });
            },

            // 渲染书签列表（支持分页和搜索）
            renderBookmarks() {
                const container = document.getElementById('bookmarksContainer');
                const filteredBookmarks = this.getFilteredBookmarks();
                const currentPageBookmarks = this.getCurrentPageBookmarks();

                if (filteredBookmarks.length === 0) {
                    let message = '点击上方"添加书签"按钮开始添加您的第一个书签';
                    if (currentCategory !== '全部') {
                        message = `当前分类"${currentCategory}"下没有书签`;
                    }
                    if (currentSearchKeyword.trim()) {
                        message = `没有找到包含"${currentSearchKeyword}"的书签`;
                    }
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-bookmark"></i>
                            <h3>暂无书签</h3>
                            <p>${message}</p>
                        </div>
                    `;
                    this.updatePagination();
                    return;
                }

                if (currentPageBookmarks.length === 0 && currentPage > 1) {
                    // 如果当前页没有数据但页码大于1，回到第一页
                    currentPage = 1;
                    this.renderBookmarks();
                    return;
                }

                let html = '';
                currentPageBookmarks.forEach(bookmark => {
                    const tagColor = this.getTagColor(bookmark.tag);
                    const isDark = this.isDarkColor(tagColor);
                    const textClass = isDark ? 'text-light' : 'text-dark';

                    html += `
                    <div class="bookmark-item" data-id="${bookmark.id}" draggable="true">
                        ${bookmark.tag ? `<span class="bookmark-tag ${textClass}" style="background-color: ${tagColor};">${bookmark.tag}</span>` : ''}
                        <div class="bookmark-title">
                            <a href="${bookmark.url}" target="_blank"
                               onmouseenter="showImagePreview(event, '${bookmark.imageUrl.replace(/'/g, "\\'")}')"
                               onmouseleave="hideImagePreview()">${bookmark.title}</a>
                        </div>
                        ${bookmark.note ? `
                        <div class="bookmark-note">
                            <i class="fas fa-sticky-note"></i>
                            <span title="${bookmark.note.replace(/"/g, '&quot;')}">${bookmark.note.length > 50 ? bookmark.note.substring(0, 50) + '...' : bookmark.note}</span>
                        </div>` : ''}
                        <div class="bookmark-actions">
                            <button class="action-btn edit" data-id="${bookmark.id}" title="编辑">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn delete" data-id="${bookmark.id}" title="删除">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    `;
                });

                container.innerHTML = html;

                // 为编辑和删除按钮添加事件监听器
                container.querySelectorAll('.action-btn.edit').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        this.openEditBookmarkModal(id);
                    });
                });

                container.querySelectorAll('.action-btn.delete').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        if (confirm('确定要删除这个书签吗？')) {
                            if (this.deleteBookmark(id)) {
                                this.showAlert('书签删除成功', 'success');
                                this.renderAll();
                            }
                        }
                    });
                });

                // 初始化拖拽排序
                this.initDragAndDrop();

                // 更新分页控件
                this.updatePagination();
            },

            // 初始化拖拽排序功能
            initDragAndDrop() {
                const container = document.getElementById('bookmarksContainer');
                const items = container.querySelectorAll('.bookmark-item');
                let draggedItem = null;

                items.forEach(item => {
                    item.addEventListener('dragstart', function(e) {
                        draggedItem = this;
                        setTimeout(() => {
                            this.style.opacity = '0.5';
                        }, 0);
                    });

                    item.addEventListener('dragend', function(e) {
                        setTimeout(() => {
                            this.style.opacity = '1';
                            draggedItem = null;
                        }, 0);
                    });

                    item.addEventListener('dragover', function(e) {
                        e.preventDefault();
                        this.style.border = '2px dashed #3498db';
                    });

                    item.addEventListener('dragleave', function(e) {
                        this.style.border = '';
                    });

                    item.addEventListener('drop', function(e) {
                        e.preventDefault();
                        this.style.border = '';
                        if (draggedItem && draggedItem !== this) {
                            // 获取两个元素的ID
                            const draggedId = draggedItem.dataset.id;
                            const targetId = this.dataset.id;

                            // 交换书签顺序（在localStorage中更新）
                            DataManager.reorderBookmarks(draggedId, targetId);
                        }
                    });
                });
            },

            // 重新排序书签
            reorderBookmarks(draggedId, targetId) {
                const bookmarks = this.getBookmarks();
                const draggedIndex = bookmarks.findIndex(b => b.id === draggedId);
                const targetIndex = bookmarks.findIndex(b => b.id === targetId);

                if (draggedIndex === -1 || targetIndex === -1) return;

                // 交换元素
                [bookmarks[draggedIndex], bookmarks[targetIndex]] = [bookmarks[targetIndex], bookmarks[draggedIndex]];

                // 保存并重新渲染
                this.saveBookmarks(bookmarks);
                this.renderBookmarks();
                this.showAlert('书签顺序已更新', 'success');
            },

            // 渲染分类下拉选项（用于书签表单）
            renderCategoryOptions() {
                const select = document.getElementById('category');
                const categories = this.getCategories();

                let html = '';
                categories.forEach(category => {
                    html += `<option value="${category}">${category}</option>`;
                });

                select.innerHTML = html;
            },

            // 渲染标签下拉选项（用于书签表单）
            renderTagOptions() {
                const select = document.getElementById('tag');
                const tags = this.getTags();

                let html = '<option value="">无标签</option>';
                tags.forEach(tag => {
                    html += `<option value="${tag.name}">${tag.name}</option>`;
                });

                select.innerHTML = html;
            },

            // 打开编辑书签模态框
            openEditBookmarkModal(id) {
                const bookmark = this.getBookmarks().find(b => b.id === id);
                if (!bookmark) return;

                editingBookmarkId = id;
                document.getElementById('bookmarkModalTitle').textContent = '编辑书签';
                document.getElementById('title').value = bookmark.title;
                document.getElementById('url').value = bookmark.url;
                document.getElementById('imageUrl').value = bookmark.imageUrl || '';
                document.getElementById('note').value = bookmark.note || '';
                document.getElementById('category').value = bookmark.category;
                document.getElementById('tag').value = bookmark.tag || '';

                this.openModal('bookmarkModal');
            },

            // 打开模态框
            openModal(modalId) {
                document.getElementById(modalId).style.display = 'flex';
            },

            // 关闭模态框
            closeModal(modalId) {
                document.getElementById(modalId).style.display = 'none';
            },

            // 获取筛选后的书签列表（基于分类、搜索关键词）
            getFilteredBookmarks() {
                let bookmarks = this.getBookmarks();

                // 分类筛选
                if (currentCategory !== '全部') {
                    bookmarks = bookmarks.filter(b => b.category === currentCategory);
                }

                // 关键词搜索
                if (currentSearchKeyword.trim()) {
                    const keyword = currentSearchKeyword.trim().toLowerCase();
                    bookmarks = bookmarks.filter(b => {
                        // 标题、备注、链接、标签、分类中搜索
                        return b.title.toLowerCase().includes(keyword) ||
                               (b.note && b.note.toLowerCase().includes(keyword)) ||
                               b.url.toLowerCase().includes(keyword) ||
                               (b.tag && b.tag.toLowerCase().includes(keyword)) ||
                               b.category.toLowerCase().includes(keyword);
                    });

                }

                return bookmarks;
            },

            // 获取当前页的书签
            getCurrentPageBookmarks() {
                const filtered = this.getFilteredBookmarks();
                const startIndex = (currentPage - 1) * itemsPerPage;
                const endIndex = startIndex + itemsPerPage;
                return filtered.slice(startIndex, endIndex);
            },

            // 获取总页数
            getTotalPages() {
                const filtered = this.getFilteredBookmarks();
                return Math.max(1, Math.ceil(filtered.length / itemsPerPage));
            },

            // 更新分页控件状态
            updatePagination() {
                const totalPages = this.getTotalPages();
                const pageInfo = document.getElementById('pageInfo');
                const prevBtn = document.getElementById('prevPageBtn');
                const nextBtn = document.getElementById('nextPageBtn');

                pageInfo.textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
                prevBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;
            },

            // 跳转到指定页码
            goToPage(page) {
                const totalPages = this.getTotalPages();
                if (page < 1) page = 1;
                if (page > totalPages) page = totalPages;
                currentPage = page;
                this.renderBookmarks();
                this.updatePagination();
            }
        };

        // 事件监听器和图片预览功能

        // 图片预览相关函数
        function showImagePreview(event, imageUrl) {
            if (!imageUrl) return;

            const preview = document.getElementById('imagePreview');
            preview.innerHTML = '<div class="image-loading">加载中...</div>';
            preview.style.display = 'block';

            // 定位预览浮层
            const x = event.clientX + 10;
            const y = event.clientY + 10;
            preview.style.left = x + 'px';
            preview.style.top = y + 'px';

            // 加载图片
            const img = new Image();
            img.onload = function() {
                preview.innerHTML = `<img src="${imageUrl}" alt="预览">`;
            };
            img.onerror = function() {
                preview.innerHTML = '<div class="image-error">图片无法加载</div>';
            };
            img.src = imageUrl;
        }

        function hideImagePreview() {
            const preview = document.getElementById('imagePreview');
            preview.style.display = 'none';
        }

        // 执行搜索
        function performSearch() {
            currentSearchKeyword = document.getElementById('searchInput').value;
            currentPage = 1; // 搜索时回到第一页
            DataManager.renderCategories();
            DataManager.renderBookmarks();
        }

        // 清除搜索
        function clearSearch() {

            currentSearchKeyword = '';
            currentPage = 1;
            DataManager.renderCategories();
            DataManager.renderBookmarks();
        }

        // 保存书签（添加或编辑）
        function saveBookmark() {
            const title = document.getElementById('title').value.trim();
            const url = document.getElementById('url').value.trim();
            const imageUrl = document.getElementById('imageUrl').value.trim();
            const note = document.getElementById('note').value.trim();
            const category = document.getElementById('category').value;
            const tag = document.getElementById('tag').value;

            if (!title || !url) {
                DataManager.showAlert('标题和链接是必填项', 'error');
                return;
            }

            const bookmarkData = {
                title,
                url,
                imageUrl,
                note,
                category,
                tag
            };

            let success = false;
            if (editingBookmarkId) {
                success = DataManager.updateBookmark(editingBookmarkId, bookmarkData);
            } else {
                bookmarkData.id = generateId();
                success = DataManager.addBookmark(bookmarkData) !== null;
            }

            if (success) {
                DataManager.showAlert(editingBookmarkId ? '书签更新成功' : '书签添加成功', 'success');
                DataManager.closeModal('bookmarkModal');
                DataManager.renderAll();
            } else {
                DataManager.showAlert('操作失败', 'error');
            }
        }

        // 编辑标签
        function editTag(tag) {
            const newName = prompt('请输入新的标签名称：', tag.name);
            if (newName === null) return;

            const newColor = prompt('请输入新的颜色（十六进制，例如 #ff0000）：', tag.color);
            if (newColor === null) return;

            const updatedTag = {
                name: newName.trim(),
                color: newColor.trim()
            };

            if (!updatedTag.name || !updatedTag.color) {
                DataManager.showAlert('标签名称和颜色不能为空', 'error');
                return;
            }

            if (DataManager.updateTag(tag.name, updatedTag)) {
                DataManager.showAlert('标签更新成功', 'success');
                renderTagManagementList();
                DataManager.renderAll();
            }
        }

        // 添加标签
        function addTag() {
            const nameInput = document.getElementById('newTagName');
            const colorInput = document.getElementById('newTagColor');

            const name = nameInput.value.trim();
            const color = colorInput.value;

            if (!name) {
                DataManager.showAlert('请输入标签名称', 'error');
                return;
            }

            const tag = { name, color };

            if (DataManager.addTag(tag)) {
                DataManager.showAlert('标签添加成功', 'success');
                nameInput.value = '';
                colorInput.value = '#3498db';
                renderTagManagementList();
                DataManager.renderAll();
            }
        }

        // 导入/导出Excel函数
        function exportToExcel() {
            const bookmarks = DataManager.getBookmarks();
            if (bookmarks.length === 0) {
                DataManager.showAlert('没有书签可导出', 'error');
                return;
            }

            // 准备工作表数据
            const wsData = [
                ['标题', '链接', '图片URL', '备注', '分类', '标签']
            ];

            bookmarks.forEach(bookmark => {
                wsData.push([
                    bookmark.title,
                    bookmark.url,
                    bookmark.imageUrl || '',
                    bookmark.note || '',
                    bookmark.category,
                    bookmark.tag || ''
                ]);
            });

            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '书签');

            // 生成文件名
            const date = new Date().toISOString().split('T')[0];
            const fileName = `书签导出_${date}.xlsx`;

            // 保存文件
            XLSX.writeFile(wb, fileName);
            DataManager.showAlert(`书签已导出为 ${fileName}`, 'success');
        }

        function importFromExcel(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                    // 跳过标题行（第一行）
                    const rows = jsonData.slice(1);
                    let importedCount = 0;
                    let errorCount = 0;

                    // 询问导入方式
                    const shouldOverwrite = confirm(
                        '请选择导入方式：\n\n' +
                        '• 点击"确定"：覆盖现有书签（清空现有书签后导入）\n' +
                        '• 点击"取消"：追加到现有书签（保留现有书签）\n\n' +
                        '注意：分类和标签将自动添加，不会删除现有分类和标签。'
                    );

                    // 如果选择覆盖，清空现有书签
                    if (shouldOverwrite) {
                        DataManager.saveBookmarks([]);
                    }

                    // 收集所有要导入的书签，先不添加，以便处理分类和标签
                    const bookmarksToAdd = [];

                    rows.forEach((row, index) => {
                        // 确保行有足够列
                        if (row.length < 6) {
                            errorCount++;
                            return;
                        }

                        const title = String(row[0] || '').trim();
                        const url = String(row[1] || '').trim();
                        const imageUrl = String(row[2] || '').trim();
                        const note = String(row[3] || '').trim();
                        const category = String(row[4] || '常用').trim();
                        const tag = String(row[5] || '').trim();

                        if (!title || !url) {
                            errorCount++;
                            return;
                        }

                        // 处理分类
                        if (category && !DataManager.getCategories().includes(category)) {
                            DataManager.addCategory(category);
                        }

                        // 处理标签
                        if (tag) {
                            const tags = DataManager.getTags();
                            if (!tags.some(t => t.name === tag)) {
                                DataManager.addTag({ name: tag, color: '#cccccc' });
                            }
                        }

                        // 创建书签对象
                        const bookmark = {
                            id: generateId(),
                            title,
                            url,
                            imageUrl,
                            note,
                            category: category || '常用',
                            tag
                        };

                        bookmarksToAdd.push(bookmark);
                        importedCount++;
                    });

                    // 批量添加书签
                    if (bookmarksToAdd.length > 0) {
                        const currentBookmarks = DataManager.getBookmarks();
                        const updatedBookmarks = shouldOverwrite ? bookmarksToAdd : [...currentBookmarks, ...bookmarksToAdd];
                        DataManager.saveBookmarks(updatedBookmarks);
                    }

                    // 重置文件输入
                    event.target.value = '';

                    // 显示结果
                    const modeText = shouldOverwrite ? '覆盖导入' : '追加导入';
                    DataManager.showAlert(`${modeText}完成！成功导入 ${importedCount} 个书签，跳过 ${errorCount} 行无效数据`, 'success');
                    DataManager.renderAll();
                } catch (error) {
                    console.error('导入Excel时出错:', error);
                    DataManager.showAlert('导入Excel失败，请检查文件格式', 'error');
                }
            };

            reader.readAsArrayBuffer(file);
        }

        // 全局状态
        let currentCategory = '全部';
        let editingBookmarkId = null;
        let currentSearchKeyword = '';
        let currentPage = 1;
        const itemsPerPage = 12; // 每页12个项目，4列×3行

        // ==============================
        // 页面加载完成后初始化
        // ==============================
        document.addEventListener('DOMContentLoaded', function() {
            DataManager.init();
            setupEventListeners();
        });
    </script>
</body>
